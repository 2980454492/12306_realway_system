<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>12306 铁路票务系统</title>
<link rel="stylesheet" href="/style.css?v=20">
</head>
<body>

<!-- ═══ 顶部导航 ═══ -->
<nav id="top-nav">
  <span class="logo">12306 铁路票务系统</span>
  <div class="nav-right">
    <span id="nav-user" class="nav-user"></span>
    <button id="btn-logout" class="btn btn-sm" onclick="Auth.logout()" style="display:none">退出</button>
  </div>
</nav>

<!-- ═══ 登录页（无侧边栏）═══ -->
<section id="page-login" class="page active">
  <div class="login-card">
    <h1>12306 铁路票务系统</h1>
    <p class="sub">Railway Ticketing System</p>
    <form id="login-form" onsubmit="Auth.login(event)">
      <input type="text" id="login-username" placeholder="用户名" required autofocus>
      <input type="password" id="login-password" placeholder="密码" required>
      <button type="submit" class="btn btn-primary btn-block">登 录</button>
      <p id="login-error" class="error-msg"></p>
    </form>
  </div>
</section>

<!-- ═══ 登录后的布局：侧边栏 + 主区域 ═══ -->
<div id="app-layout">
  <!-- 侧边栏 -->
  <aside id="sidebar">
    <div class="sidebar-menu">
      <a class="sidebar-item active" data-page="query" onclick="UI.navTo('query')">
        <span class="sidebar-icon">🔍</span> 列车余票查询
      </a>
      <a class="sidebar-item" data-page="station" onclick="UI.navTo('station')">
        <span class="sidebar-icon">🚉</span> 车站查询
      </a>
      <a class="sidebar-item" data-page="orders" onclick="UI.navTo('orders')">
        <span class="sidebar-icon">📋</span> 我的订单
      </a>
      <div class="sidebar-divider staff-only" style="display:none"></div>
      <a class="sidebar-item staff-only" data-page="trains" style="display:none" onclick="UI.navTo('trains')">
        <span class="sidebar-icon">🚂</span> 列车管理
      </a>
      <a class="sidebar-item staff-only" data-page="my-submissions" style="display:none" onclick="UI.navTo('my-submissions')">
        <span class="sidebar-icon">📤</span> 我的提交
      </a>
      <a class="sidebar-item staff-only" data-page="approvals" style="display:none" onclick="UI.navTo('approvals')">
        <span class="sidebar-icon">✅</span> 审批中心
      </a>

    </div>
  </aside>

  <!-- 主内容区 -->
  <main id="main-content">

    <!-- ═══ 查票页 ═══ -->
    <section id="page-query" class="page active">
      <h2>列车余票查询</h2>
      <div class="search-bar">
        <input type="text" id="query-from" placeholder="出发城市/车站" autocomplete="off">
        <span class="arrow">→</span>
        <input type="text" id="query-to" placeholder="到达城市/车站" autocomplete="off">
        <datalist id="stations-datalist"></datalist>
        <input type="date" id="query-date">
        <select id="query-sort">
          <option value="departure">发车时间优先</option>
          <option value="arrival">到达时间优先</option>
          <option value="duration">少用时优先</option>
          <option value="distance">短距离优先</option>
          <option value="price">低票价优先</option>
        </select>
        <button class="btn btn-primary" onclick="UI.queryTrains()">查询</button>
      </div>
      <div id="query-loading" class="loading" style="display:none">查询中…</div>
      <div id="query-error" class="error-msg"></div>
      <!-- 筛选栏 -->
      <div class="filter-panel" id="filter-panel">
        <div class="filter-row">
          <div class="filter-group" id="filter-type-group">
            <span class="filter-label">车型</span>
            <label class="filter-check"><input type="checkbox" class="filter-type-all" checked onchange="UI.toggleAllTypes(this)"> 全部</label>
            <label class="filter-check"><input type="checkbox" class="filter-type-item" value="G" checked onchange="UI.onTypeChange()"> G</label>
            <label class="filter-check"><input type="checkbox" class="filter-type-item" value="D" checked onchange="UI.onTypeChange()"> D</label>
            <label class="filter-check"><input type="checkbox" class="filter-type-item" value="C" checked onchange="UI.onTypeChange()"> C</label>
            <label class="filter-check"><input type="checkbox" class="filter-type-item" value="Z" checked onchange="UI.onTypeChange()"> Z</label>
            <label class="filter-check"><input type="checkbox" class="filter-type-item" value="T" checked onchange="UI.onTypeChange()"> T</label>
            <label class="filter-check"><input type="checkbox" class="filter-type-item" value="K" checked onchange="UI.onTypeChange()"> K</label>
            <label class="filter-check"><input type="checkbox" class="filter-type-item" value="S" checked onchange="UI.onTypeChange()"> S</label>
            <label class="filter-check"><input type="checkbox" class="filter-type-item" value="OTHER" checked onchange="UI.onTypeChange()"> 其他</label>
          </div>
        </div>
        <div class="filter-row" id="filter-station-row">
          <div class="filter-group" id="filter-from-stations">
            <span class="filter-label">出发站</span>
          </div>
          <div class="filter-group" id="filter-to-stations">
            <span class="filter-label">到达站</span>
          </div>
        </div>
        <div class="filter-row">
          <div class="filter-group">
            <label class="filter-check"><input type="checkbox" id="filter-has-ticket" onchange="UI.applyFilters()"> 只看有票</label>
          </div>
          <div class="filter-group">
            <span class="filter-label">出发时间</span>
            <select id="filter-dep-from" class="filter-time" onchange="UI.onDepFromChange()">
              <option value="">不限</option>
            </select>
            <span class="filter-time-sep">–</span>
            <select id="filter-dep-to" class="filter-time" onchange="UI.applyFilters()">
              <option value="">不限</option>
            </select>
          </div>
          <div class="filter-group">
            <span class="filter-label">到达时间</span>
            <select id="filter-arr-from" class="filter-time" onchange="UI.onArrFromChange()">
              <option value="">不限</option>
            </select>
            <span class="filter-time-sep">–</span>
            <select id="filter-arr-to" class="filter-time" onchange="UI.applyFilters()">
              <option value="">不限</option>
            </select>
          </div>
        </div>
      </div>
      <div class="tabs">
        <button class="tab active" onclick="UI.switchTab('direct')">直达 <span id="tab-direct-count"></span></button>
        <button class="tab" onclick="UI.switchTab('transfer')">换乘 <span id="tab-transfer-count"></span></button>
      </div>
      <div id="query-results" class="train-list"></div>
    </section>

    <!-- ═══ 车站查询 ═══ -->
    <section id="page-station" class="page">
      <h2>车站查询</h2>
      <div class="search-bar">
        <input type="text" id="station-query-input" placeholder="城市/车站" autocomplete="off" oninput="UI.onStationInput()" onfocus="UI.onStationInput()">
        <datalist id="station-query-datalist"></datalist>
        <select id="station-sort" onchange="UI.searchStation()">
          <option value="departure">发车时间优先</option>
          <option value="train_id">车次排序</option>
        </select>
        <button class="btn btn-primary" onclick="UI.searchStation()">查询</button>
      </div>
      <!-- 筛选栏 -->
      <div class="filter-panel" id="station-filter-panel">
        <div class="filter-row">
          <div class="filter-group" id="station-filter-type-group">
            <span class="filter-label">车型</span>
            <label class="filter-check"><input type="checkbox" class="station-filter-type-all" checked onchange="UI.toggleAllTypes(this)"> 全部</label>
            <label class="filter-check"><input type="checkbox" class="station-filter-type-item" value="G" checked onchange="UI.onTypeChange()"> G</label>
            <label class="filter-check"><input type="checkbox" class="station-filter-type-item" value="D" checked onchange="UI.onTypeChange()"> D</label>
            <label class="filter-check"><input type="checkbox" class="station-filter-type-item" value="C" checked onchange="UI.onTypeChange()"> C</label>
            <label class="filter-check"><input type="checkbox" class="station-filter-type-item" value="Z" checked onchange="UI.onTypeChange()"> Z</label>
            <label class="filter-check"><input type="checkbox" class="station-filter-type-item" value="T" checked onchange="UI.onTypeChange()"> T</label>
            <label class="filter-check"><input type="checkbox" class="station-filter-type-item" value="K" checked onchange="UI.onTypeChange()"> K</label>
            <label class="filter-check"><input type="checkbox" class="station-filter-type-item" value="S" checked onchange="UI.onTypeChange()"> S</label>
            <label class="filter-check"><input type="checkbox" class="station-filter-type-item" value="OTHER" checked onchange="UI.onTypeChange()"> 其他</label>
          </div>
        </div>
        <div class="filter-row" id="station-filter-st-row" style="display:none">
          <div class="filter-group" id="station-filter-st-group">
            <span class="filter-label">车站</span>
          </div>
        </div>
      </div>
      <div id="station-count" style="display:none;color:#9090a0;font-size:14px;margin-bottom:8px;"></div>
      <!-- 结果 -->
      <div id="station-results"></div>
      <div id="station-loading" class="loading" style="display:none">查询中…</div>
    </section>

    <!-- ═══ 购票页 ═══ -->
    <section id="page-order-form" class="page">
      <button class="btn btn-back" onclick="UI.goBack()">← 返回查票</button>
      <h2>购票</h2>
      <div id="order-train-info" class="info-card"></div>
      <div class="form-group">
        <label>席位类型</label>
        <select id="order-seat-type" disabled style="opacity:0.7"></select>
      </div>
      <div class="form-group">
        <label>乘车人姓名</label>
        <input type="text" id="order-passenger-name" placeholder="乘车人姓名" required>
      </div>
      <div class="form-group">
        <label>乘车人身份证号</label>
        <input type="text" id="order-passenger-id" placeholder="身份证号" required>
      </div>
      <button class="btn btn-primary btn-block" onclick="UI.submitOrder()">确认下单</button>
      <p id="order-form-error" class="error-msg"></p>
    </section>

    <!-- ═══ 订单页 ═══ -->
    <section id="page-orders" class="page">
      <h2>我的订单</h2>
      <div class="filter-bar">
        <button class="btn btn-sm active" onclick="UI.filterOrders('')">全部</button>
        <button class="btn btn-sm" onclick="UI.filterOrders('PAID')">已支付</button>
        <button class="btn btn-sm" onclick="UI.filterOrders('REFUNDED')">已退票</button>
      </div>
      <div id="orders-loading" class="loading" style="display:none">加载中…</div>
      <div id="orders-list"></div>
    </section>

    <!-- ═══ 新增列车页（职工）═══ -->
    <section id="page-add-train" class="page">
      <button class="btn btn-back" onclick="UI.navTo('trains')">← 返回列车管理</button>
      <h2>新增列车</h2>
      <!-- 车次配置 -->
      <div class="form-row-3">
        <div class="form-group">
          <label>列车种类</label>
          <select id="new-train-prefix" onchange="UI.onPrefixChange()">
            <option value="">请选择</option>
            <option value="G">G 高铁</option>
            <option value="D">D 动车</option>
            <option value="C">C 城际</option>
            <option value="Z">Z 直达</option>
            <option value="T">T 特快</option>
            <option value="K">K 快速</option>
            <option value="S">S 市郊</option>
            <option value="OTHER">其他</option>
          </select>
        </div>
        <div class="form-group">
          <label>车次号</label>
          <input type="text" id="new-train-number" placeholder="如 2492">
        </div>
        <div class="form-group">
          <label>列车类型</label>
          <select id="new-train-type" onchange="UI.onTrainTypeChange()">
            <option value="0">图定列车</option>
            <option value="1">临客</option>
          </select>
        </div>
      </div>
      <div class="hint" id="speed-limit-hint" style="display:none"></div>
      <!-- 日期 -->
      <div id="train-date-row" class="form-row-2" style="margin-top:8px">
        <div class="form-group" id="train-date-single" style="display:none">
          <input type="date" id="new-train-valid-from">
        </div>
        <div class="form-group" id="train-date-range" style="display:none">
          <span style="display:flex;gap:8px;align-items:center">
            <input type="date" id="new-train-range-from">
            <span style="color:#707090">至</span>
            <input type="date" id="new-train-range-to">
          </span>
        </div>
      </div>

      <!-- ── 选线：始发站 ── -->
      <label style="font-size:13px;color:#9090b0;margin-top:16px;display:block">始发站</label>
      <div class="form-row-2">
        <div class="form-group">
          <input type="text" id="first-station-input" list="train-station-datalist" placeholder="始发站名" autocomplete="off">
          <datalist id="train-station-datalist"></datalist>
        </div>
        <div class="form-group">
          <input type="time" id="first-depart-time">
        </div>
      </div>
      <button class="btn btn-primary btn-block" onclick="UI.onFirstStationChange()" style="margin-top:10px;padding:12px;font-size:15px">下一步：选择线路</button>

      <!-- ── 已选路径 ── -->
      <label style="font-size:13px;color:#9090b0;margin-top:16px;display:block">运行路径</label>
      <div id="route-path-list"></div>

      <!-- ── 可选邻居（当前站出发的线路）── -->
      <div id="neighbor-panel" style="display:none;margin-top:12px;padding:12px;background:#16213e;border:1px solid #0f3460;border-radius:8px">
        <label style="font-size:14px;color:#53a8ff;display:block;margin-bottom:8px">选择下一站（点击线路卡片）</label>
        <div id="neighbor-options" class="neighbor-options"></div>
        <button class="btn btn-primary btn-sm" onclick="UI.finishRoute()" style="margin-top:10px">✓ 设为终点站</button>
      </div>

      <!-- ── 到发时间弹窗 ── -->
      <div id="stop-time-modal" class="overlay" style="display:none">
        <div class="detail-card" style="width:360px" onclick="event.stopPropagation()">
          <h3 id="stop-time-title"></h3>
          <div class="form-group" style="margin-top:12px">
            <label class="filter-check" style="margin-bottom:8px">
              <input type="checkbox" id="stop-is-stop" checked onchange="UI.onStopToggle()"> 停靠本站
            </label>
          </div>
          <div class="form-row-2" id="stop-time-fields">
            <div class="form-group">
              <label>到站时间</label>
              <input type="time" id="stop-arrival-time">
            </div>
            <div class="form-group">
              <label>发车时间</label>
              <input type="time" id="stop-depart-time">
            </div>
          </div>
          <div class="form-group" id="pass-time-field" style="display:none">
            <label>通过时间</label>
            <input type="time" id="stop-pass-time">
          </div>
          <div id="stop-speed-info" class="hint" style="margin-top:8px"></div>
          <div class="form-actions">
            <button class="btn btn-primary" onclick="UI.confirmStop()">确认</button>
            <button class="btn" onclick="UI.cancelStop()">取消</button>
          </div>
        </div>
      </div>

      <!-- 席位 -->
      <div class="form-group" style="margin-top:16px">
        <label>席位配置</label>
        <div class="seat-config-row">
          <span>商务座 <input type="number" id="sc-business" value="0" min="0" style="width:60px"></span>
          <span>一等座 <input type="number" id="sc-first" value="50" min="0" style="width:60px"></span>
          <span>二等座 <input type="number" id="sc-second" value="100" min="0" style="width:60px"></span>
          <span>硬卧 <input type="number" id="sc-sleeper" value="0" min="0" style="width:60px"></span>
          <span>硬座 <input type="number" id="sc-hseat" value="0" min="0" style="width:60px"></span>
          <span>无座 <input type="number" id="sc-noseat" value="50" min="0" style="width:60px"></span>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="UI.submitNewTrain()">提交审批</button>
        <button class="btn" onclick="UI.navTo('trains')">取消</button>
      </div>
      <p id="add-train-error" class="error-msg"></p>
    </section>

    <!-- ═══ 列车管理页（职工）═══ -->
    <section id="page-trains" class="page">
      <h2>列车管理</h2>
      <div class="filter-bar">
        <button class="btn btn-sm active" onclick="UI.filterTrains('')">全部</button>
        <button class="btn btn-sm" onclick="UI.filterTrains('ACTIVE')">运行中</button>
        <button class="btn btn-sm" onclick="UI.filterTrains('SUSPENDED')">已停运</button>
        <button class="btn btn-sm" onclick="UI.filterTrains('ARCHIVED')">已归档</button>
        <button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="UI.navTo('add-train')">+ 新增列车</button>
      </div>
      <div id="trains-loading" class="loading" style="display:none">加载中…</div>
      <div id="trains-list"></div>
    </section>

    <!-- ═══ 我的提交（职工）═══ -->
    <section id="page-my-submissions" class="page">
      <h2>我的提交</h2>
      <div class="filter-bar">
        <button class="btn btn-sm active" onclick="UI.filterMySubmissions('')">全部</button>
        <button class="btn btn-sm" onclick="UI.filterMySubmissions('SUBMITTED')">待审批</button>
        <button class="btn btn-sm" onclick="UI.filterMySubmissions('APPROVED')">已通过</button>
        <button class="btn btn-sm" onclick="UI.filterMySubmissions('REJECTED')">已驳回</button>
      </div>
      <div id="my-submissions-loading" class="loading" style="display:none">加载中…</div>
      <div id="my-submissions-list"></div>
    </section>

    <!-- ═══ 审批中心（审核员）═══ -->
    <section id="page-approvals" class="page">
      <h2>审批中心</h2>
      <div class="filter-bar">
        <button class="btn btn-sm active" onclick="UI.filterApprovals('SUBMITTED')">待审批</button>
        <button class="btn btn-sm" onclick="UI.filterApprovals('')">全部</button>
        <button class="btn btn-sm" onclick="UI.filterApprovals('APPROVED')">已通过</button>
        <button class="btn btn-sm" onclick="UI.filterApprovals('REJECTED')">已驳回</button>
      </div>
      <div id="approvals-loading" class="loading" style="display:none">加载中…</div>
      <div id="approvals-list"></div>
    </section>

  </main>
</div>

<!-- ═══ 模板：审批卡片 / 提交卡片 ═══ -->
<template id="tpl-approval-card">
  <div class="approval-card">
    <div class="approval-header">
      <span class="approval-type"></span>
      <span class="approval-status"></span>
    </div>
    <div class="approval-meta-submitter"></div>
    <div class="approval-payload"></div>
    <div class="approval-actions"></div>
    <div class="approval-meta-decider"></div>
    <div class="approval-comment"></div>
  </div>
</template>

<template id="tpl-submission-card">
  <div class="approval-card">
    <div class="approval-header">
      <span class="approval-type"></span>
      <span class="approval-status"></span>
    </div>
    <div class="approval-meta-submitter"></div>
    <div class="approval-meta-decider"></div>
    <div class="approval-comment"></div>
  </div>
</template>

<template id="tpl-train-mgmt-card">
  <div class="train-mgmt-card">
    <div class="train-mgmt-info">
      <span class="train-mgmt-id"></span>
      <span class="tag train-tag-type"></span>
      <span class="tag train-tag-status"></span>
      <span class="train-mgmt-stops"></span>
    </div>
    <div class="train-mgmt-actions"></div>
  </div>
</template>

<!-- ═══ 车次详情弹窗 ═══ -->
<div id="detail-overlay" class="overlay" onclick="UI.closeDetail()">
  <div class="detail-card" onclick="event.stopPropagation()">
    <div class="detail-header">
      <h3 id="detail-train-id"></h3>
      <button class="btn btn-sm" onclick="UI.closeDetail()">✕</button>
    </div>
    <div class="detail-body" id="detail-stops"></div>
  </div>
</div>

<!-- ═══ Toast 通知 ═══ -->
<div id="toast" class="toast"></div>

<script src="/app.js?v=44"></script>
</body>
</html>
